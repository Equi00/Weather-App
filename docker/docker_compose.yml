version: "3.9"

services:
  backend:
    build: ../backend
    container_name: weather_backend
    environment:
      MONGO_URL: mongodb://mongodb:27017
    ports:
      - "8000:8000"

  frontend:
    build: ../frontend
    container_name: weather_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"